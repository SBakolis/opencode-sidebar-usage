name: Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  release:
    # Only run when a PR is merged. The release bump is selected from
    # the `release:major` / `release:minor` / `release:patch` labels on
    # the merged PR. PRs without one of these labels are skipped.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2

      - name: Select version bump from release labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          LABELS=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" --jq '.[].name')
          echo "PR labels:"
          echo "$LABELS"

          has_label() { printf '%s\n' "$LABELS" | grep -Fxq -- "$1"; }

          BUMP=""
          if has_label "release:major"; then
            BUMP=major
          elif has_label "release:minor"; then
            BUMP=minor
          elif has_label "release:patch"; then
            BUMP=patch
          else
            echo "No release:major / release:minor / release:patch label on PR #${PR_NUMBER}; skipping release."
            exit 1
          fi

          echo "Selected bump: $BUMP"
          echo "BUMP=$BUMP" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

      - name: Bump package version
        run: npm version "$BUMP" --no-git-tag-version

      - name: Commit version bump
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          git commit -m "chore(release): v$(node -p "require('./package.json').version")"
          git push origin HEAD:main

      - run: npm run build:all
      - run: npm publish
